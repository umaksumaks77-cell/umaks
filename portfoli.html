<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio | BCA Graduate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-gradient { background: linear-gradient(135.43deg, #2563eb 0%, #7c3aed 100%); }
        .glass-sidebar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row min-h-screen p-6 gap-8">
        
        <aside class="lg:w-1/3 w-full">
            <div class="glass-sidebar sticky top-6 p-8 rounded-3xl shadow-2xl border border-white text-center">
                
                <div class="relative w-44 h-44 mx-auto mb-6">
                    <div class="absolute inset-0 profile-gradient rounded-3xl rotate-6 shadow-lg"></div>
                    <img src="YOUR_DIRECT_IMAGE_LINK_HERE" 
                         alt="Professional Profile" 
                         class="relative z-10 w-full h-full object-cover rounded-3xl border-4 border-white shadow-md font-bold text-xs flex items-center justify-center bg-gray-200"
                         onerror="this.src='https://ui-avatars.com/api/?name=BCA+Student&background=2563eb&color=fff&size=200'">
                </div>

                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Your Name</h1>
                <p class="text-blue-600 font-mono text-sm font-bold uppercase tracking-widest mt-2">BCA Candidate</p>

                <div class="mt-8 space-y-4 text-left border-t border-slate-100 pt-8">
                    <div class="flex items-center gap-3 text-slate-600">
                        <i class="fas fa-envelope text-blue-500"></i>
                        <span class="text-sm font-medium">contact@yourdomain.com</span>
                    </div>
                    <div class="flex items-center gap-3 text-slate-600">
                        <i class="fab fa-linkedin text-blue-500"></i>
                        <span class="text-sm font-medium">linkedin.com/in/username</span>
                    </div>
                </div>

                <a href="#" class="block w-full mt-10 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 uppercase text-xs tracking-widest">
                    Download CV <i class="fas fa-download ml-2"></i>
                </a>
            </div>
        </aside>

        <main class="lg:w-2/3 w-full space-y-8">
            <section class="bg-white p-10 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-blue-600 font-black text-xs uppercase tracking-widest mb-4">About Me</h2>
                <p class="text-xl text-slate-700 leading-relaxed font-semibold">
                    Focused on developing efficient software systems using <span class="text-blue-600">Logic & Algorithms</span>. As a BCA student, I combine theoretical computer science with modern full-stack development.
                </p>
            </section>

            <div id="dynamic-content" class="grid grid-cols-1 gap-8">
                </div>
        </main>
    </div>

    <script>
        const projects = [
            { title: "Inventory System", tech: "Python/SQL", desc: "Systematic tracking of warehouse stock using relational databases." },
            { title: "Web Dashboard", tech: "React/Node", desc: "Professional interface for monitoring real-time system metrics." }
        ];

        const container = document.getElementById('dynamic-content');
        projects.forEach(p => {
            container.innerHTML += `
                <div class="bg-white p-8 rounded-3xl border border-slate-200 hover:border-blue-500 transition shadow-sm">
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${p.tech}</span>
                    <h3 class="text-2xl font-bold mt-2">${p.title}</h3>
                    <p class="text-slate-500 mt-4 leading-relaxed">${p.desc}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
